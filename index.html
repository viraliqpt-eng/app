<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <!-- Todo o teu head original mantido intacto -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SHITAGRAM™ — Arena Ao Vivo</title>
  <!-- ... resto do teu head ... -->
</head>
<body>
  <!-- Todo o teu HTML mantido intacto até a secção live -->

  <section class="card arena" id="live">
    <div class="arena-top">
      <div><span id="arenaYouName">MicoMaster</span> <span style="color:var(--pink);">VS</span> <span id="arenaRivalName">VexamePro</span></div>
      <div class="timer" id="timer">01:00</div>
      <div class="pill" id="arenaThemePill">Tema: Romance Falhado</div>
    </div>

    <div class="stage">
      <div class="video">
        <div class="tag left">TU</div>
        <div class="video-content" id="cameraSlot">
          <video id="localVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;border-radius:20px;"></video>
        </div>
      </div>

      <div class="vs">VS</div>

      <div class="video">
        <div class="tag right">RIVAL</div>
        <div class="video-content" id="rivalSlot">
          <video id="remoteVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover;border-radius:20px;"></video>
        </div>
      </div>
    </div>

    <!-- resto do teu HTML mantido -->
  </section>

  <script>
    // === WEBRTC REAL + XP ===
    let localStream = null;
    let peerConnection = null;
    let ws = null;
    let playerXP = 1250;

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');

    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        showToast("Câmara ligada com sucesso!");
      } catch (err) {
        showToast("Erro ao acessar câmara");
      }
    }

    function updateXP(amount = 850) {
      playerXP += amount;
      // Poderia atualizar UI de XP se quiseres
      console.log(`+${amount} XP! Total: ${playerXP}`);
    }

    // Inicializa WebRTC básico
    document.getElementById("cameraBtn").addEventListener("click", startCamera);
    document.getElementById("startBtn").addEventListener("click", () => {
      updateXP();
      showToast("Batalha iniciada! +850 XP");
    });

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2200);
    }
  </script>
</body>
</html>
