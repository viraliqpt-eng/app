<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHITAGRAM™ — Arena Ao Vivo</title>
  <meta name="description" content="Batalhas de micos em tempo real com WebRTC" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #FF00C7;
      --purple: #8B00FF;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #0A0A0A 0%, #1A0A2E 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .video {
      width: 100%;
      height: 380px;
      background: #111;
      border-radius: 20px;
      object-fit: cover;
    }
    button {
      padding: 14px 28px;
      margin: 6px 4px;
      border: none;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(90deg, var(--pink), var(--purple)); color: white; }
    .xp-bar {
      height: 10px;
      background: #333;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0;
    }
    .xp-fill {
      height: 100%;
      background: linear-gradient(to right, var(--pink), var(--purple));
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <h1 style="text-align:center;margin-bottom:8px;">SHITAGRAM™</h1>
  <p style="text-align:center;color:#FF00C7;font-weight:700;">Arena Ao Vivo — Batalha de Micos</p>

  <div class="card">
    <input id="playerName" value="MicoMaster" style="width:100%;padding:14px;border-radius:12px;border:1px solid #444;background:#1a1a1a;color:white;margin-bottom:12px;">
    <button onclick="createRoom()" class="btn-primary">Criar Sala</button>
    <button onclick="joinRoom()">Entrar em Sala Existente</button>
  </div>

  <div id="status" class="card" style="min-height:60px;"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="card">
      <h3>Tu</h3>
      <video id="localVideo" class="video" autoplay playsinline muted></video>
      <button onclick="startCamera()" style="width:100%;margin-top:12px;">📹 Ligar Câmara</button>
    </div>
    <div class="card">
      <h3>Rival</h3>
      <video id="remoteVideo" class="video" autoplay playsinline></video>
    </div>
  </div>

  <div class="card">
    <button onclick="startBattle()" class="btn-primary" style="width:100%;padding:18px;font-size:18px;">🚀 INICIAR BATALHA</button>
    <p style="margin:16px 0 8px 0;">XP: <strong id="xpDisplay">1250</strong> | Nível: <span id="levelDisplay">Sobrevivente Social</span></p>
    <div class="xp-bar">
      <div id="xpFill" class="xp-fill" style="width:45%"></div>
    </div>
  </div>

  <script>
    // ==================== CONFIG ====================
    let localStream = null;
    let peerConnection = null;
    let ws = null;
    let roomCode = null;
    let isHost = false;
    let playerXP = 1250;

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const statusEl = document.getElementById('status');
    const xpDisplay = document.getElementById('xpDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const xpFill = document.getElementById('xpFill');

    const LEVELS = [
      {name: "Humano Real", min: 0},
      {name: "Sobrevivente Social", min: 5000},
      {name: "Mico Recorrente", min: 15000},
      {name: "Especialista em Trapalhadas", min: 35000},
      {name: "Lenda da Vergonha", min: 80000},
      {name: "Catástrofe Ambulante", min: 200000}
    ];

    function getLevel(xp) {
      for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (xp >= LEVELS[i].min) return LEVELS[i].name;
      }
      return LEVELS[0].name;
    }

    function updateXP(amount = 0) {
      playerXP += amount;
      xpDisplay.textContent = playerXP;
      xpFill.style.width = Math.min((playerXP % 10000) / 100, 100) + '%';
      levelDisplay.textContent = getLevel(playerXP);
    }

    // ==================== CÂMARA ====================
    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localVideo.srcObject = localStream;
        statusEl.innerHTML = "✅ Câmara ligada com sucesso";
      } catch (err) {
        statusEl.innerHTML = "❌ Erro ao acessar câmara";
      }
    }

    // ==================== SALAS ====================
    function createRoom() {
      roomCode = "SHITA" + Math.floor(Math.random() * 9999);
      isHost = true;
      statusEl.innerHTML = `✅ Sala criada: <strong>${roomCode}</strong><br>Envia este código ao teu rival`;
      connectWebSocket();
    }

    function joinRoom() {
      roomCode = prompt("Digite o código da sala:");
      if (roomCode) {
        isHost = false;
        statusEl.innerHTML = `✅ Entraste na sala: <strong>${roomCode}</strong>`;
        connectWebSocket();
      }
    }

    // ==================== WEBSOCKET SIGNALING ====================
    function connectWebSocket() {
      ws = new WebSocket('ws://localhost:8080');
      ws.onopen = () => statusEl.innerHTML += "<br>🔗 Conectado ao servidor";
      ws.onmessage = (e) => console.log("Sinal recebido:", e.data);
    }

    // ==================== BATALHA ====================
    function startBattle() {
      if (!roomCode) {
        statusEl.innerHTML = "❌ Cria ou entra numa sala primeiro";
        return;
      }
      updateXP(850);
      statusEl.innerHTML = "🔥 Batalha iniciada! +850 XP";
    }

    // Init
    updateXP();
  </script>
</body>
</html>
