<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404SOCIAL™</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;color:#ddd;font-family:"Courier New",monospace}
.app{max-width:520px;margin:auto;min-height:100vh;background:#101010;padding-bottom:90px}
.top{background:#ffd21a;color:#000;padding:22px 18px;border-bottom:4px solid #000}
.logo{font-size:34px;font-weight:900}
.logo span{background:#000;color:#ffd21a;padding:4px 8px;border-radius:6px}
.sub{font-size:13px;letter-spacing:3px;font-weight:900}
.status{display:flex;justify-content:space-between;padding:14px 18px;background:#090909;border-bottom:1px solid #222}
.red{color:#ff4d5f;font-weight:bold}.yellow{color:#ffd21a;font-weight:bold}
.page{display:none;padding:18px}.page.active{display:block}
.card{background:#000;padding:22px;margin-bottom:24px;border:1px solid #222;box-shadow:8px 8px #070707}
.user{display:flex;justify-content:space-between;border-bottom:1px solid #222;padding-bottom:14px;margin-bottom:18px}
.name{color:#ffd21a;font-weight:900;font-size:18px}.time{color:#888;font-size:13px}
.bugbox{border:3px solid #31dfff;padding:30px 18px;text-align:center;color:#31dfff;font-size:20px;line-height:1.5;background:#101010;border-radius:6px}
.emoji{font-size:46px;display:block;margin-bottom:12px}
.actions{display:flex;gap:10px;margin-top:18px}
.actions button{flex:1;background:#050505;color:#eee;border:1px solid #333;padding:10px;font-size:17px;font-family:inherit}
textarea,input{width:100%;background:#111;color:#ffd21a;border:1px solid #333;padding:14px;font-family:inherit;font-size:16px;margin-bottom:12px}
.mainbtn{width:100%;background:#ffd21a;color:#000;border:0;padding:14px;font-family:inherit;font-weight:900;font-size:16px}
.panel-title{color:#31dfff;font-size:20px;margin-bottom:16px;font-weight:900}
.rank li{list-style:none;padding:12px 0;border-bottom:1px solid #222}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:520px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);background:#020202;border-top:1px solid #222}
nav button{background:#050505;color:#aaa;border:0;border-left:1px solid #222;padding:12px 4px;font-family:inherit;font-weight:900}
nav button.active{color:#ffd21a;background:#111}
.navico{display:block;font-size:24px;margin-bottom:4px}
</style>
</head>

<body>
<div class="app">

<header class="top">
  <div class="logo">404 <span>SOCIAL</span>™</div>
  <div class="sub">THE FAILURE NETWORK</div>
</header>

<section class="status">
  <div>🔴 Instabilidade: <span class="red">96%</span></div>
  <div>Pontos: <span class="yellow" id="points">0</span></div>
</section>

<main id="feed" class="page active"></main>

<main id="criar" class="page">
  <section class="card">
    <h2 class="panel-title">➕ CRIAR NOVO BUG</h2>
    <input id="username" placeholder="@nome_do_bug">
    <textarea id="content" rows="5" placeholder="Escreve o teu erro..."></textarea>
    <button class="mainbtn" onclick="createPost()">PUBLICAR FALHA</button>
  </section>
</main>

<main id="ranking" class="page">
  <section class="card">
    <h2 class="panel-title yellow">🏆 RANKING DE INSANIDADE</h2>
    <ul class="rank" id="rankList"></ul>
  </section>
</main>

<main id="perfil" class="page">
  <section class="card">
    <h2 class="name">@tu_bugaste</h2><br>
    <p>Pontos totais: <span class="yellow" id="profilePoints">0</span></p>
    <p>Estado: <span class="red">Instável</span></p>
    <p>Classe: Artesão de Código Podre</p>
  </section>
</main>

</div>

<nav>
  <button class="active" onclick="showPage('feed',this)"><span class="navico">🏠</span>FEED</button>
  <button onclick="showPage('criar',this)"><span class="navico">➕</span>CRIAR</button>
  <button onclick="showPage('ranking',this)"><span class="navico">🏆</span>RANKING</button>
  <button onclick="showPage('perfil',this)"><span class="navico">👤</span>PERFIL</button>
</nav>

<script>
const SUPABASE_URL = "https://odapqudsflnpdcducksh.supabase.co";
const SUPABASE_KEY = "sb_publishable_qBCGv0kFh167OiQI1BQvzQ_C85FXpEJ";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let totalPoints = 0;

function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(id === "ranking") loadRanking();
}

async function loadPosts(){
  const { data, error } = await db
    .from("posts_404")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    document.getElementById("feed").innerHTML = "<p>Erro ao carregar feed.</p>";
    return;
  }

  document.getElementById("feed").innerHTML = "";

  data.forEach(post=>{
    renderPost(post);
  });
}

function renderPost(post){
  const card = document.createElement("article");
  card.className = "card";

  card.innerHTML = `
    <div class="user">
      <div class="name">⚠️ ${escapeHtml(post.username)}</div>
      <div class="time">${new Date(post.created_at).toLocaleString("pt-PT")}</div>
    </div>

    <div class="bugbox">
      <span class="emoji">📄</span>
      ${escapeHtml(post.content)}
    </div>

    <div class="actions">
      <button onclick="reactPost('${post.id}','reactions_warning')">⚠️ ${post.reactions_warning}</button>
      <button onclick="reactPost('${post.id}','reactions_skull')">💀 ${post.reactions_skull}</button>
      <button onclick="reactPost('${post.id}','reactions_laugh')">😂 ${post.reactions_laugh}</button>
    </div>
  `;

  document.getElementById("feed").appendChild(card);
}

async function createPost(){
  const username = document.getElementById("username").value.trim() || "@anon_bug";
  const content = document.getElementById("content").value.trim();

  if(!content){
    alert("Erro 404: texto não encontrado.");
    return;
  }

  const { error } = await db.from("posts_404").insert({
    username,
    content,
    category:"bug"
  });

  if(error){
    alert("Erro ao publicar.");
    console.error(error);
    return;
  }

  await addUserPoints(username, 50);

  document.getElementById("username").value = "";
  document.getElementById("content").value = "";

  showPage("feed", document.querySelector("nav button"));
  loadPosts();
  loadRanking();
}

async function reactPost(id, column){
  const { data, error } = await db
    .from("posts_404")
    .select("*")
    .eq("id", id)
    .single();

  if(error) return;

  const value = data[column] + 1;

  await db
    .from("posts_404")
    .update({ [column]: value })
    .eq("id", id);

  totalPoints += 5;
  updatePoints();

  await addUserPoints(data.username, 5);

  loadPosts();
}

async function addUserPoints(username, pts){
  const { data } = await db
    .from("users_404")
    .select("*")
    .eq("username", username)
    .maybeSingle();

  if(data){
    await db
      .from("users_404")
      .update({ points: data.points + pts })
      .eq("username", username);
  } else {
    await db
      .from("users_404")
      .insert({ username, points: pts });
  }
}

async function loadRanking(){
  const { data, error } = await db
    .from("users_404")
    .select("*")
    .order("points", { ascending:false })
    .limit(10);

  if(error) return;

  const list = document.getElementById("rankList");
  list.innerHTML = "";

  data.forEach((user,index)=>{
    const medals = ["🥇","🥈","🥉"];
    const medal = medals[index] || "💻";
    list.innerHTML += `<li>${medal} ${escapeHtml(user.username)} — <span class="red">${user.points} pts</span></li>`;
  });
}

function updatePoints(){
  document.getElementById("points").textContent = totalPoints;
  document.getElementById("profilePoints").textContent = totalPoints;
}

function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadPosts();
loadRanking();

db.channel("posts_404_realtime")
  .on("postgres_changes", { event:"*", schema:"public", table:"posts_404" }, () => {
    loadPosts();
  })
  .subscribe();
</script>

</body>
</html>
